version: '3.8'

services:
  ai-security-tool:
    build: .
    image: ai-security-audit:latest
    container_name: ai-security-audit
    volumes:
      - ./reports:/app/reports
      - ./config.json:/app/config.json:ro
    environment:
      # Windows (VcXsrv): DISPLAY=host.docker.internal:0.0
      # Linux/WSL2 (WSLg): DISPLAY=$DISPLAY
      - DISPLAY=${DISPLAY:-host.docker.internal:0.0}
    network_mode: host
